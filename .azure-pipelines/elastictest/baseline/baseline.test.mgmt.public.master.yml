name: BaselineTest_$(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

schedules:
  - cron: "0 4 * * *"
    displayName: Baseline test Scheduler
    branches:
      include:
        - master
    always: true

stages:
- stage: Pre_test
  variables:
  - group: GIT_SECRETS
  jobs:
  - job: validate_test_cases
    displayName: "Validate Test Cases"
    timeoutInMinutes: 20
    continueOnError: false
    pool: ubuntu-20.04
    steps:
    - template: ../../pytest-collect-only.yml

- stage: Test_round_1
  dependsOn: Pre_test
  condition: and(succeeded(), in(dependencies.Pre_test.result, 'Succeeded'))
  variables:
  - group: SONiC-Elastictest
  - name: inventory
    value: veos_vtb
  - name: testbed_file
    value: vtestbed.yaml
  - group: GIT_SECRETS
  jobs:
  - job: t0_elastictest
    displayName: "kvmtest-t0 by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
    - template: ../../run-test-elastictest-template.yml
      parameters:
        TOPOLOGY: t0
        MIN_WORKER: 5
        MAX_WORKER: 5
        KVM_IMAGE_BRANCH: "master"
        MGMT_BRANCH: "master"

  - job: t0_2vlans_elastictest
    displayName: "kvmtest-t0-2vlans by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
    - template: ../../run-test-elastictest-template.yml
      parameters:
        TOPOLOGY: t0
        TEST_SET: t0-2vlans
        MIN_WORKER: 5
        MAX_WORKER: 5
        DEPLOY_MG_EXTRA_PARAMS: "-e vlan_config=two_vlan_a"
        KVM_IMAGE_BRANCH: "master"
        MGMT_BRANCH: "master"

  - job: t1_lag_elastictest
    displayName: "kvmtest-t1-lag by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
    - template: ../../run-test-elastictest-template.yml
      parameters:
        TOPOLOGY: t1-lag
        MIN_WORKER: 5
        MAX_WORKER: 5
        KVM_IMAGE_BRANCH: "master"
        MGMT_BRANCH: "master"

  - job: dualtor_elastictest
    displayName: "kvmtest-dualtor-t0 by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
      - template: ../../run-test-elastictest-template.yml
        parameters:
          TOPOLOGY: dualtor
          MIN_WORKER: 5
          MAX_WORKER: 5
          COMMON_EXTRA_PARAMS: "--disable_loganalyzer "
          KVM_IMAGE_BRANCH: "master"
          MGMT_BRANCH: "master"

  - job: multi_asic_elastictest
    displayName: "kvmtest-multi-asic-t1-lag by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
      - template: ../../run-test-elastictest-template.yml
        parameters:
          TOPOLOGY: t1-8-lag
          TEST_SET: multi-asic-t1-lag
          MIN_WORKER: 5
          MAX_WORKER: 5
          NUM_ASIC: 4
          KVM_IMAGE_BRANCH: "master"
          MGMT_BRANCH: "master"

  - job: sonic_t0_elastictest
    displayName: "kvmtest-t0-sonic by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
      - template: ../../run-test-elastictest-template.yml
        parameters:
          TOPOLOGY: t0-64-32
          MIN_WORKER: 5
          MAX_WORKER: 5
          TEST_SET: t0-sonic
          COMMON_EXTRA_PARAMS: "--neighbor_type=sonic "
          VM_TYPE: vsonic
          KVM_IMAGE_BRANCH: "master"
          MGMT_BRANCH: "master"

  - job: dpu_elastictest
    displayName: "kvmtest-dpu by Elastictest"
    timeoutInMinutes: 240
    continueOnError: false
    pool: ubuntu-20.04
    steps:
      - template: ../../run-test-elastictest-template.yml
        parameters:
          TOPOLOGY: dpu
          MIN_WORKER: 5
          MAX_WORKER: 5
          KVM_IMAGE_BRANCH: "master"
          MGMT_BRANCH: "master"

